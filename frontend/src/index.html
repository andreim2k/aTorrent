<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>@Torrent - Fast & Secure</title>

  <!-- Theme Manager MUST load first -->
  <script src="/js/theme.js"></script>

  <!-- Modern UI Stylesheet -->
  <link rel="stylesheet" href="/css/modern-ui.css">
  
  <style>
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-color);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .redirect-card {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      padding: 48px;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .logo-text {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .subtitle-text {
      color: var(--text-secondary);
      font-size: 1.125rem;
      margin-top: 12px;
      font-weight: 300;
    }

    .redirect-text {
      color: var(--text-tertiary);
      font-size: 14px;
    }

    /* Theme Toggle Button */
    .theme-toggle-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
      z-index: 50;
    }

    .theme-toggle-btn:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-md);
    }

    .theme-toggle-btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 480px) {
      .logo-text {
        font-size: 2rem;
      }

      .redirect-card {
        padding: 32px;
      }

      .theme-toggle-btn {
        width: 40px;
        height: 40px;
        font-size: 18px;
        top: 16px;
        right: 16px;
      }
    }
  </style>
  
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
    
    // Redirect after a brief moment to show the modern UI
    setTimeout(() => {
      const token = getCookie('access_token');
      window.location.href = token ? '/dashboard.html' : '/login.html';
    }, 1000);
  </script>
</head>
<body class="modern-gradient-bg">
  <!-- Theme Toggle Button -->
  <button class="theme-toggle-btn" onclick="themeManager.toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light theme">
    <span id="theme-icon">🌙</span>
  </button>
  <script>
    // Initialize theme icon
    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      if (icon) {
        icon.textContent = themeManager.isDarkTheme() ? '☀️' : '🌙';
      }
    }
    updateThemeIcon();
  </script>

  <!-- Floating Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div class="redirect-card" style="text-align: center;">
      <div class="logo-pulse" style="margin-bottom: 32px;">
        <h1 class="logo-text">
          @Torrent
        </h1>
        <p class="subtitle-text">
          Fast. Secure. Beautiful.
        </p>
      </div>

      <div class="spinner" style="margin: 0 auto 24px;"></div>

      <p class="redirect-text">
        Redirecting to your dashboard...
      </p>
    </div>
  </div>
</body>
</html>
