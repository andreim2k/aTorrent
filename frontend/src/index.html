<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>@Torrent - Fast & Secure</title>
  
  <!-- Modern UI Stylesheet -->
  <link rel="stylesheet" href="/css/modern-ui.css">
  
  <style>
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .redirect-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 48px;
      box-shadow: 
        0 8px 32px 0 rgba(31, 38, 135, 0.37),
        0 0 60px 0 rgba(255, 255, 255, 0.05);
      animation: fadeInUp 0.8s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .logo-pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
  
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
    
    // Redirect after a brief moment to show the modern UI
    setTimeout(() => {
      const token = getCookie('access_token');
      window.location.href = token ? '/dashboard.html' : '/login.html';
    }, 1000);
  </script>
</head>
<body class="modern-gradient-bg">
  <!-- Floating Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  
  <div style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div class="redirect-card" style="text-align: center;">
      <div class="logo-pulse" style="margin-bottom: 32px;">
        <h1 style="font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0;">
          @Torrent
        </h1>
        <p style="color: rgba(255, 255, 255, 0.8); font-size: 1.125rem; margin-top: 12px; font-weight: 300;">
          Fast. Secure. Beautiful.
        </p>
      </div>
      
      <div class="spinner" style="margin: 0 auto 24px;"></div>
      
      <p style="color: rgba(255, 255, 255, 0.6); font-size: 14px;">
        Redirecting to your dashboard...
      </p>
    </div>
  </div>
</body>
</html>
