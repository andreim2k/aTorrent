<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <title>Settings - @Torrent</title>

        <!-- Theme Manager MUST load first -->
        <script src="/js/theme.js"></script>

        <!-- Modern UI Stylesheet -->
        <link rel="stylesheet" href="/css/modern-ui.css" />

        <!-- Alpine.js from CDN -->
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
        ></script>

        <!-- Tailwind CSS from CDN -->
        <script src="https://cdn.tailwindcss.com?v=3.4.1"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: {
                                main: "#667eea",
                                light: "#e3f2fd",
                                dark: "#764ba2",
                            },
                            secondary: {
                                main: "#e74c3c",
                                light: "#ffebee",
                                dark: "#c0392b",
                            },
                            success: {
                                main: "#11998e",
                                light: "#38ef7d",
                                dark: "#06b88d",
                            },
                            warning: {
                                main: "#ffa726",
                                light: "#ffb74d",
                                dark: "#f57c00",
                            },
                            error: {
                                main: "#c0392b",
                                light: "#e74c3c",
                                dark: "#a93226",
                            },
                            background: {
                                default: "#1a1a2e",
                                paper: "#16213e",
                                elevated: "#0f3460",
                            },
                            text: {
                                primary: "#ffffff",
                                secondary: "#b3b3b3",
                                disabled: "#666666",
                            },
                        },
                    },
                },
            };
        </script>

        <style>
            /* Use modern gradient background with theme variables */
            .text-xs { font-size: 0.7rem !important; }
            body { font-size: 14px; }

            /* Responsive navigation fixes */
            @media (max-width: 640px) {
                .mui-btn-danger {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-btn-outlined {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                nav {
                    width: 100%;
                    justify-content: center;
                }
                nav a,
                nav button {
                    flex: 0 0 auto;
                    min-width: fit-content;
                }
            }

            /* Use modern card styles with theme variables */
            .mui-card {
                background: var(--glass-bg);
                backdrop-filter: blur(30px) saturate(180%);
                border-radius: 20px;
                box-shadow: var(--shadow-md);
                border: 1px solid var(--glass-border);
                transition: all 0.3s ease;
            }

            .mui-card:hover {
                box-shadow: var(--shadow-lg);
                transform: translateY(-2px);
            }

            .mui-btn {
                padding: 12px 24px;
                font-size: 0.875rem;
                border-radius: 12px;
                font-weight: 600;
                transition: all 0.3s ease;
                cursor: pointer;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .mui-btn-contained {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #fff;
                box-shadow: var(--shadow-md);
                border: none;
            }
            .mui-btn-contained:hover {
                box-shadow: var(--shadow-lg);
                transform: translateY(-2px);
            }
            .mui-btn-contained:disabled {
                background: var(--bg-tertiary);
                color: var(--text-tertiary);
                cursor: not-allowed;
            }
            .mui-btn-outlined {
                background: var(--glass-bg);
                color: #667eea;
                border: 2px solid #667eea;
                font-weight: 600;
            }
            .mui-btn-outlined:hover {
                background: rgba(102, 126, 234, 0.15);
            }
            .mui-input {
                width: 100%;
                padding: 12px 16px;
                background: var(--input-bg);
                border: 1px solid var(--input-border);
                border-radius: 12px;
                color: var(--text-primary);
                transition: all 0.3s ease;
            }
            .mui-input:focus {
                outline: none;
                border-color: #667eea;
                background: var(--glass-bg);
                box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            }
            .mui-nav-link {
                display: inline-flex;
                align-items: center;
                padding: 12px 24px;
                border-radius: 10px;
                transition: all 0.3s ease;
                color: var(--text-secondary);
            }
            .mui-nav-link:hover {
                background: var(--glass-bg);
                color: var(--text-primary);
            }
            .mui-nav-link.active {
                background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
                color: var(--text-primary);
            }
            .mui-spinner {
                display: inline-block;
                width: 20px;
                height: 20px;
                border: 2px solid var(--border-color);
                border-top-color: #667eea;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
            }
            .mui-btn-danger {
                background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
                color: #fff;
                box-shadow: var(--shadow-md);
                border: none;
            }
            .mui-btn-danger:hover {
                box-shadow: var(--shadow-lg);
                transform: translateY(-2px);
            }
            .mui-alert {
                padding: 12px 16px;
                border-radius: 12px;
                margin-bottom: 16px;
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
            }
            .mui-alert-success {
                background: rgba(17, 153, 142, 0.12);
                color: #38ef7d;
                border: 1px solid rgba(56, 239, 125, 0.3);
            }
            .mui-alert-error {
                background: rgba(192, 57, 43, 0.12);
                color: #c0392b;
                border: 1px solid rgba(192, 57, 43, 0.3);
            }
            .mui-alert-warning {
                background: rgba(255, 167, 38, 0.12);
                color: #ffa726;
                border: 1px solid rgba(255, 167, 38, 0.3);
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            /* Mobile button consistency */
            @media (max-width: 640px) {
                .mui-btn-danger {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-nav-link {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-btn-outlined {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-btn {
                    padding: 12px 20px !important;
                    font-size: 0.875rem !important;
                }
            }
        </style>
    </head>
    <body class="modern-gradient-dashboard">
        <!-- Theme Toggle Button -->
        <button class="theme-toggle-btn" onclick="themeManager.toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light theme">
            <span id="theme-icon">🌙</span>
        </button>
        <script>
            function updateThemeIcon() {
                const icon = document.getElementById('theme-icon');
                if (icon) {
                    icon.textContent = themeManager.isDarkTheme() ? '☀️' : '🌙';
                }
            }
            updateThemeIcon();
        </script>

        <!-- Floating Orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div x-data="settingsApp()" x-init="init()" class="relative z-10">
            <!-- Header -->
            <header class="modern-nav sticky top-0">
                <div class="max-w-7xl mx-auto container-responsive py-3 sm:py-4">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-4">
                        <h1 class="text-xl sm:text-2xl font-bold text-gradient glow-text">@Torrent</h1>
                        <nav class="flex flex-wrap justify-center sm:justify-start gap-2">
                            <a href="/dashboard.html" class="modern-nav-link">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                                </svg>
                                <span class="hide-mobile">Dashboard</span>
                            </a>
                            <a href="/torrents.html" class="modern-nav-link">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                                </svg>
                                <span class="hide-mobile">Torrents</span>
                            </a>
                            <a href="/statistics.html" class="modern-nav-link">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                                </svg>
                                <span class="hide-mobile">Stats</span>
                            </a>
                            <a href="/settings.html" class="modern-nav-link active">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                                <span class="hide-mobile">Settings</span>
                            </a>
                            <button @click="logout()" class="modern-btn modern-btn-danger sm:ml-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                                </svg>
                                <span class="hide-mobile">Logout</span>
                            </button>
                        </nav>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="max-w-7xl mx-auto container-responsive py-6 sm:py-8">
                <div class="page-heading-section mb-8 animate-fade-in">
                    <h2 class="page-heading-title">Settings</h2>
                    <p class="page-heading-subtitle">
                        Manage your account and system preferences
                    </p>
                </div>

                <!-- Loading State -->
                <template x-if="loading">
                    <div class="text-center py-8">
                        <div class="mui-spinner"></div>
                    </div>
                </template>

                <!-- Settings Content -->
                <template x-if="!loading">
                    <div class="space-y-6">
                        <!-- Alerts -->
                        <template x-if="alert.show">
                            <div
                                :class="'mui-alert mui-alert-' + alert.type"
                                x-text="alert.message"
                            ></div>
                        </template>

                        <!-- Change Password Section -->
                        <div class="mui-card p-6">
                            <div class="flex items-center mb-6">
                                <svg
                                    class="w-6 h-6 mr-3 text-primary-main"
                                    fill="currentColor"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
                                    />
                                </svg>
                                <div>
                                    <h3 class="text-lg font-bold">
                                        Change Password
                                    </h3>
                                    <p class="text-xs text-text-secondary">
                                        Update your account password for
                                        security
                                    </p>
                                </div>
                            </div>

                            <div class="space-y-4">
                                <div>
                                    <label
                                        class="block text-xs font-medium mb-2"
                                        >Current Password</label
                                    >
                                    <div class="relative">
                                        <input
                                            :type="showPasswords.current ? 'text' : 'password'"

                                            class="mui-input pr-12"

                                                viewBox="0 0 24 24"

                                                />
                                            </svg>
                                        </button>
                                    </div>
                                </div>

                                <div
                                    class="grid grid-cols-1 md:grid-cols-2 gap-4"
                                >
                                    <div>
                                        <label
                                            class="block text-xs font-medium mb-2"
                                            >New Password</label
                                        >
                                        <div class="relative">
                                            <input
                                                :type="showPasswords.new ? 'text' : 'password'"
                                                x-model="passwordForm.newPassword"
                                                class="mui-input pr-12"
                                            />
                                            <button
                                                @click="showPasswords.new = !showPasswords.new"
                                                class="absolute right-3 top-1/2 -translate-y-1/2 text-text-secondary hover:text-text-primary"
                                            >
                                                <svg
                                                    x-show="!showPasswords.new"
                                                    class="w-5 h-5"
                                                    fill="currentColor"

                                                    class="w-5 h-5"
                                                    fill="currentColor"
                                                    viewBox="0 0 24 24"
                                                >
                                                    <path

                                                    />
                                                </svg>
                                            </button>
                                        </div>
                                        <p
                                            class="text-xs text-text-secondary mt-1"
                                        >
                                            Minimum 6 characters
                                        </p>
                                    </div>

                                    <div>
                                        <label
                                            class="block text-xs font-medium mb-2"
                                            >Confirm New Password</label
                                        >
                                        <div class="relative">
                                            <input
                                                :type="showPasswords.confirm ? 'text' : 'password'"
                                                x-model="passwordForm.confirmPassword"
                                                class="mui-input pr-12"
                                            />
                                            <button
                                                @click="showPasswords.confirm = !showPasswords.confirm"
                                                class="absolute right-3 top-1/2 -translate-y-1/2 text-text-secondary hover:text-text-primary"
                                            >

                                                    x-show="!showPasswords.confirm"
                                                    class="w-5 h-5"
                                                    fill="currentColor"
                                                    viewBox="0 0 24 24"
                                                >
                                                    <path
                                                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                                                    />
                                                </svg>
                                                <svg
                                                    x-show="showPasswords.confirm"
                                                    class="w-5 h-5"
                                                    fill="currentColor"
                                                    viewBox="0 0 24 24"

                                            class="text-xs text-text-secondary mt-1"

                                        @click="changePassword()"
                                        :disabled="changingPassword"
                                        class="mui-btn mui-btn-contained flex items-center gap-2"
                                    >
                                        <svg
                                            class="w-5 h-5"
                                            fill="currentColor"
                                            viewBox="0 0 24 24"
                                        >
                                            <path
                                                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
                                            />
                                        </svg>
                                        <span
                                            x-text="changingPassword ? 'Changing...' : 'Change Password'"
                                        ></span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Download Settings Section -->
                        <div class="mui-card p-6">
                            <div class="flex items-center mb-6">
                                <svg
                                    class="w-6 h-6 mr-3 text-primary-main"
                                    fill="currentColor"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        d="M10 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"
                                    />
                                </svg>
                                <div>
                                    <h3 class="text-lg font-bold">
                                        Download Settings
                                    </h3>
                                    <p class="text-xs text-text-secondary">
                                        Configure where torrents will be
                                        downloaded
                                    </p>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-medium mb-2"
                                    >Default Download Path</label
                                >
                                <input
                                    type="text"
                                    x-model="localDownloadPath"
                                    @input="downloadPathDirty = (localDownloadPath !== settings.default_download_path)"
                                    @blur="saveDownloadPath()"
                                    @keydown.enter="saveDownloadPath()"
                                    class="mui-input"
                                    placeholder="/path/to/downloads"
                                />
                                <p class="text-xs text-text-secondary mt-1">
                                    Where torrents will be downloaded (press
                                    Enter or click outside to save)
                                    <span
                                        x-show="downloadPathDirty"
                                        class="text-warning-main ml-2 font-medium"
                                        >⚠ Unsaved changes</span
                                    >
                                </p>
                            </div>

                            <!-- Max Active Downloads -->
                            <div class="mt-6">
                                <label class="block text-xs font-medium mb-2"
                                    >Max Active Downloads</label
                                >
                                <input
                                    type="number"
                                    x-model="localMaxActiveDownloads"
                                    @input="maxActiveDownloadsDirty = (localMaxActiveDownloads !== settings.max_active_downloads)"
                                    @blur="saveMaxActiveDownloads()"
                                    @keydown.enter="saveMaxActiveDownloads()"
                                    class="mui-input"
                                    placeholder="5"
                                    min="1"
                                    max="50"
                                />
                                <p class="text-xs text-text-secondary mt-1">
                                    Maximum number of torrents downloading simultaneously
                                    <span
                                        x-show="maxActiveDownloadsDirty"
                                        class="text-warning-main ml-2 font-medium"
                                        >⚠ Unsaved changes</span
                                    >
                                </p>
                            </div>

                        </div>

                        <!-- Movie Information Section (Separate Card) -->
                        <div class="mui-card p-6">
                                <div class="flex items-center mb-6">
                                    <svg
                                        class="w-6 h-6 mr-3 text-primary-main"
                                        fill="currentColor"
                                        viewBox="0 0 24 24"
                                    >
                                        <path
                                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2zM12 15.4l3.76 2.27-1-4.28 3.32-2.88-4.38-.38L12 6.1l-1.7 4.03-4.38.38 3.32 2.88-1 4.28L12 15.4z"
                                        />
                                    </svg>
                                    <div>
                                        <h3 class="text-lg font-bold">
                                            Movie Information
                                        </h3>
                                        <p class="text-xs text-text-secondary">
                                            Configure TMDB integration for movie
                                            details in torrent popups
                                        </p>
                                    </div>
                                </div>

                                <div>
                                    <label
                                        class="block text-xs font-medium mb-2"
                                        >TMDB API Key</label
                                    >
                                    <input
                                        type="password"
                                        x-model="localTmdbApiKey"
                                        @input="tmdbApiKeyDirty = (localTmdbApiKey !== settings.tmdb_api_key)"
                                        @blur="saveTmdbApiKey()"
                                        @keydown.enter="saveTmdbApiKey()"
                                        class="mui-input"
                                        placeholder="Enter your TMDB API key"
                                    />
                                    <p class="text-xs text-text-secondary mt-1">
                                        Get your free API key from
                                        <a
                                            href="https://www.themoviedb.org/settings/api"
                                            target="_blank"
                                            class="text-primary-main hover:text-primary-light underline"
                                        >
                                            The Movie Database (TMDB)
                                        </a>
                                        (press Enter or click outside to save)
                                        <span
                                            x-show="tmdbApiKeyDirty"
                                            class="text-warning-main ml-2 font-medium"
                                            >⚠ Unsaved changes</span
                                        >
                                    </p>
                                    <p class="text-xs text-text-secondary mt-2">
                                        <strong
                                            >How to get your API key:</strong
                                        >
                                        <br />1. Create a free account on TMDB
                                        <br />2. Go to your account Settings →
                                        API <br />3. Copy your "API Key (v3
                                        auth)" and paste it here <br />4. This
                                        enables rich movie information in
                                        torrent details
                                    </p>
                                </div>
                            </div>
                        </div>
                </template>
            </main>

            <!-- Footer -->
            <footer class="text-center py-8 text-text-secondary text-xs">
                <p>Copyright © 2025. All rights reserved.</p>
            </footer>
        </div>

        <script src="/js/api-config.js"></script>
        <script src="/js/websocket-client.js"></script>
        
        <!-- Error Handler -->
        <script src="/js/modules/error-handler.js"></script>
        
        <!-- API Client -->
        <script src="/js/modules/api-client.js"></script>
        
        <!-- Torrent Manager -->
        <script src="/js/modules/torrent-manager.js"></script>
        <script>
            // Utilities
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(";").shift();
            }

            // API Configuration
            let API_BASE = null;

            async function initializeApiBase() {
                if (!API_BASE) {
                    await window.apiConfig.initialize();
                    API_BASE = `${window.apiConfig.baseUrl}/api/v1`;
                    console.log('API_BASE initialized:', API_BASE);
                }
                return API_BASE;
            }

            async function ensureApiInitialized() {
                return await initializeApiBase();
            }

            initializeApiBase().then(() => {
                console.log('Settings API_BASE ready:', API_BASE);
            });

            // Alpine.js App
            function settingsApp() {
                return {
                    loading: false,
                    changingPassword: false,
                    savingSettings: false,
                    downloadPathDirty: false,
                    maxActiveDownloadsDirty: false,
                    tmdbApiKeyDirty: false,
                    localTmdbApiKey: "",
                    localDownloadPath: "",
                    localMaxActiveDownloads: 5,
                    settings: {
                        tmdb_api_key: "",
                        default_download_path: "",
                        max_active_downloads: 5,
                    },
                    passwordForm: {
                        currentPassword: "",
                        newPassword: "",
                        confirmPassword: "",
                    },
                    showPasswords: {
                        current: false,
                        new: false,
                        confirm: false,
                    },
                    alert: {
                        show: false,
                        type: "success",
                        message: "",
                    },

                    async init() {
                        const token = getCookie("access_token");
                        if (!token) {
                            window.location.href = "/login.html";
                            return;
                        }

                        await this.loadSettings();
                    },

                    async loadSettings() {
                        this.loading = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                    },
                                },
                            );

                            if (response.ok) {
                                const data = await response.json();
                                this.settings = data;
                                this.localDownloadPath =
                                    data.default_download_path || "";
                                this.localMaxActiveDownloads =
                                    data.max_active_downloads || 5;
                                this.downloadPathDirty = false;
                                this.localTmdbApiKey = data.tmdb_api_key;
                                this.tmdbApiKeyDirty = false;
                            }
                        } catch (error) {
                            console.error("Failed to load settings:", error);
                        } finally {
                            this.loading = false;
                        }
                    },

                    showAlert(type, message) {
                        this.alert = { show: true, type, message };
                        setTimeout(() => {
                            this.alert.show = false;
                        }, 5000);
                    },

                    async saveDownloadPath() {
                        if (!this.downloadPathDirty) return;

                        this.savingSettings = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    method: "PUT",
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        ...this.settings,
                                        default_download_path:
                                            this.localDownloadPath,
                                    }),
                                },
                            );

                            if (response.ok) {
                                this.settings.default_download_path =
                                    this.localDownloadPath;
                                this.downloadPathDirty = false;
                                this.showAlert(
                                    "success",
                                    "Settings saved successfully",
                                );
                            } else {
                                const error = await response.json();
                                this.showAlert(
                                    "error",
                                    error.detail || "Failed to save settings",
                                );
                            }
                        } catch (error) {
                            console.error("Failed to save settings:", error);
                            this.showAlert("error", "Failed to save settings");
                        } finally {
                            this.savingSettings = false;
                        }
                    },

                    async saveMaxActiveDownloads() {
                        if (!this.maxActiveDownloadsDirty) return;

                        this.savingSettings = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    method: "PUT",
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        ...this.settings,
                                        max_active_downloads:
                                            parseInt(this.localMaxActiveDownloads),
                                    }),
                                },
                            );

                            if (response.ok) {
                                this.settings.max_active_downloads =
                                    parseInt(this.localMaxActiveDownloads);
                                this.maxActiveDownloadsDirty = false;
                                this.showAlert(
                                    "success",
                                    "Settings saved successfully",
                                );
                            } else {
                                const error = await response.json();
                                this.showAlert(
                                    "error",
                                    error.detail || "Failed to save settings",
                                );
                            }
                        } catch (error) {
                            console.error("Failed to save settings:", error);
                            this.showAlert("error", "Failed to save settings");
                        } finally {
                            this.savingSettings = false;
                        }
                    },

                    async saveTmdbApiKey() {
                        if (!this.tmdbApiKeyDirty) return;

                        this.savingSettings = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    method: "PUT",
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        ...this.settings,
                                        tmdb_api_key: this.localTmdbApiKey,
                                    }),
                                },
                            );

                            if (response.ok) {
                                this.settings.tmdb_api_key =
                                    this.localTmdbApiKey;
                                this.tmdbApiKeyDirty = false;
                                this.showAlert(
                                    "success",
                                    "TMDB API key saved successfully",
                                );
                            } else {
                                const error = await response.json();
                                this.showAlert(
                                    "error",
                                    error.detail ||
                                        "Failed to save TMDB API key",
                                );
                            }
                        } catch (error) {
                            console.error(
                                "Failed to save TMDB API key:",
                                error,
                            );
                            this.showAlert(
                                "error",
                                "Failed to save TMDB API key",
                            );
                        } finally {
                            this.savingSettings = false;
                        }
                    },

                    async changePassword() {
                        // Validation
                        if (!this.passwordForm.currentPassword) {
                            this.showAlert(
                                "error",
                                "Please enter your current password",
                            );
                            return;
                        }

                        if (!this.passwordForm.newPassword) {
                            this.showAlert(
                                "error",
                                "Please enter a new password",
                            );
                            return;
                        }

                        if (!this.passwordForm.confirmPassword) {
                            this.showAlert(
                                "error",
                                "Please confirm your new password",
                            );
                            return;
                        }

                        if (this.passwordForm.newPassword.length < 6) {
                            this.showAlert(
                                "error",
                                "New password must be at least 6 characters long",
                            );
                            return;
                        }

                        if (
                            this.passwordForm.newPassword !==
                            this.passwordForm.confirmPassword
                        ) {
                            this.showAlert(
                                "error",
                                "New passwords do not match. Please ensure both password fields are identical.",
                            );
                            return;
                        }

                        if (
                            this.passwordForm.currentPassword ===
                            this.passwordForm.newPassword
                        ) {
                            this.showAlert(
                                "error",
                                "New password must be different from your current password",
                            );
                            return;
                        }

                        // Recommend stronger password
                        if (this.passwordForm.newPassword.length < 8) {
                            this.showAlert(
                                "warning",
                                "For better security, we recommend using a password that is at least 8 characters long",
                            );
                        }

                        this.changingPassword = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/auth/change-password`,
                                {
                                    method: "POST",
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        current_password:
                                            this.passwordForm.currentPassword,
                                        new_password:
                                            this.passwordForm.newPassword,
                                        confirm_password:
                                            this.passwordForm.confirmPassword,
                                    }),
                                },
                            );

                            if (response.ok) {
                                this.showAlert(
                                    "success",
                                    "Password changed successfully",
                                );
                                // Clear form
                                this.passwordForm = {
                                    currentPassword: "",
                                    newPassword: "",
                                    confirmPassword: "",
                                };
                                this.showPasswords = {
                                    current: false,
                                    new: false,
                                    confirm: false,
                                };
                            } else {
                                const error = await response.json();
                                let errorMsg =
                                    error.detail || "Failed to change password";

                                // Improve error messages
                                if (typeof errorMsg === "string") {
                                    if (
                                        errorMsg
                                            .toLowerCase()
                                            .includes("current password")
                                    ) {
                                        errorMsg =
                                            "Current password is incorrect. Please try again.";
                                    } else if (errorMsg === "Not Found") {
                                        errorMsg =
                                            "User not found or invalid credentials";
                                    }
                                } else if (Array.isArray(errorMsg)) {
                                    errorMsg = errorMsg.join(", ");
                                }

                                this.showAlert("error", errorMsg);
                            }
                        } catch (error) {
                            console.error("Failed to change password:", error);
                            this.showAlert(
                                "error",
                                "Failed to change password",
                            );
                        } finally {
                            this.changingPassword = false;
                        }
                    },

                    logout() {
                        document.cookie =
                            "access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                        document.cookie =
                            "refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                        window.location.href = "/login.html";
                    },
                };
            }
        </script>
    </body>
</html>
