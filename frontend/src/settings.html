<!doctype html>
<html lang="en" data-theme="light">
    <head>

        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

        <script src="/js/theme.js"></script>

        <!-- Authentication Interceptor - Load early to catch all API calls -->

        <!-- Alpine.js from CDN -->

            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
        ></script>

        <!-- Tailwind CSS from CDN -->
        <script src="https://cdn.tailwindcss.com?v=3.4.1"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: {
                                main: "#667eea",
                                light: "#e3f2fd",
                                dark: "#764ba2",
                            },
                            secondary: {
                                main: "#e74c3c",
                                light: "#ffebee",
                                dark: "#c0392b",
                            },
                            success: {
                                main: "#11998e",
                                light: "#38ef7d",
                                dark: "#06b88d",
                            },
                            warning: {
                                main: "#ffa726",
                                light: "#ffb74d",
                                dark: "#f57c00",
                            },
                            error: {
                                main: "#c0392b",
                                light: "#e74c3c",
                                dark: "#a93226",
                            },
                            background: {
                                default: "#1a1a2e",
                                paper: "#16213e",
                                elevated: "#0f3460",

                                primary: "#ffffff",
                                secondary: "#b3b3b3",

        <style>
            /* Use modern gradient background with theme variables */
            .text-xs { font-size: 0.7rem !important; }
            body { font-size: 14px; }

            /* Responsive navigation fixes */
            @media (max-width: 640px) {
                .mui-btn-danger {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-btn-outlined {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                nav {
                    width: 100%;
                    justify-content: center;
                }
                nav a,
                nav button {
                    flex: 0 0 auto;
                    min-width: fit-content;
                }
            }

            /* Use modern card styles with theme variables */
            .mui-card {
                background: var(--glass-bg);
                backdrop-filter: blur(30px) saturate(180%);
                border-radius: 20px;
                box-shadow: var(--shadow-md);
                border: 1px solid var(--glass-border);
                transition: all 0.3s ease;
            }

            .mui-card:hover {
                box-shadow: var(--shadow-lg);
                transform: translateY(-2px);
            }

            .mui-btn {
                padding: 12px 24px;
                font-size: 0.875rem;
                border-radius: 12px;
                font-weight: 600;
                transition: all 0.3s ease;
                cursor: pointer;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .mui-btn-contained {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #fff;
                box-shadow: var(--shadow-md);
                border: none;
            }
            .mui-btn-contained:hover {
                box-shadow: var(--shadow-lg);
                transform: translateY(-2px);
            }
            .mui-btn-contained:disabled {
                background: var(--bg-tertiary);
                color: var(--text-tertiary);
                cursor: not-allowed;
            }
            .mui-btn-outlined {
                background: var(--glass-bg);
                color: #667eea;
                border: 2px solid #667eea;
                font-weight: 600;
            }
            .mui-btn-outlined:hover {
                background: rgba(102, 126, 234, 0.15);
            }
            .mui-input {
                width: 100%;
                padding: 12px 16px;
                background: var(--input-bg);
                border: 1px solid var(--input-border);
                border-radius: 12px;
                color: var(--text-primary);
                transition: all 0.3s ease;
            }
            .mui-input:focus {
                outline: none;
                border-color: #667eea;
                background: var(--glass-bg);
                box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            }
            .mui-nav-link {
                display: inline-flex;
                align-items: center;
                padding: 12px 24px;
                border-radius: 10px;
                transition: all 0.3s ease;
                color: var(--text-secondary);
            }
            .mui-nav-link:hover {
                background: var(--glass-bg);
                color: var(--text-primary);
            }
            .mui-nav-link.active {
                background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
                color: var(--text-primary);
            }
            .mui-spinner {
                display: inline-block;
                width: 20px;
                height: 20px;
                border: 2px solid var(--border-color);
                border-top-color: #667eea;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
            }
            .mui-btn-danger {
                background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
                color: #fff;
                box-shadow: var(--shadow-md);
                border: none;
            }
            .mui-btn-danger:hover {
                box-shadow: var(--shadow-lg);
                transform: translateY(-2px);
            }
            .mui-alert {
                padding: 12px 16px;
                border-radius: 12px;
                margin-bottom: 16px;
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
            }
            .mui-alert-success {
                background: rgba(17, 153, 142, 0.12);
                color: #38ef7d;
                border: 1px solid rgba(56, 239, 125, 0.3);
            }
            .mui-alert-error {
                background: rgba(192, 57, 43, 0.12);
                color: #c0392b;
                border: 1px solid rgba(192, 57, 43, 0.3);
            }
            .mui-alert-warning {
                background: rgba(255, 167, 38, 0.12);
                color: #ffa726;
                border: 1px solid rgba(255, 167, 38, 0.3);
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            /* Mobile button consistency */
            @media (max-width: 640px) {
                .mui-btn-danger {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-nav-link {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-btn-outlined {
                    padding: 8px 12px !important;
                    font-size: 0.875rem !important;
                }
                .mui-btn {
                    padding: 12px 20px !important;
                    font-size: 0.875rem !important;
                }
            }
        </style>

        <!-- Torrent Manager -->

        <script>
            // Utilities
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(";").shift();
            }

            // API Configuration
            let API_BASE = null;

            async function initializeApiBase() {
                if (!API_BASE) {
                    await window.apiConfig.initialize();
                    API_BASE = `${window.apiConfig.baseUrl}/api/v1`;
                    console.log('API_BASE initialized:', API_BASE);
                }
                return API_BASE;
            }

            async function ensureApiInitialized() {
                return await initializeApiBase();
            }

            initializeApiBase().then(() => {
                console.log('Settings API_BASE ready:', API_BASE);
            });

            // Alpine.js App
            function settingsApp() {
                return {
                    loading: false,
                    savingSettings: false,
                    downloadPathDirty: false,
                    maxActiveDownloadsDirty: false,
                    tmdbApiKeyDirty: false,
                    localTmdbApiKey: "",
                    localDownloadPath: "",
                    localMaxActiveDownloads: 5,
                    settings: {
                        tmdb_api_key: "",
                        default_download_path: "",
                        max_active_downloads: 5,
                    },
                    alert: {
                        show: false,
                        type: "success",
                        message: "",
                    },

                    async init() {
                        const token = getCookie("access_token");
                        if (!token) {
                            window.location.href = "/login.html";
                            return;
                        }

                        await this.loadSettings();
                    },

                    async loadSettings() {
                        this.loading = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                    },
                                },
                            );

                            if (response.ok) {
                                const data = await response.json();
                                this.settings = data;
                                this.localDownloadPath =
                                    data.default_download_path || "";
                                this.localMaxActiveDownloads =
                                    data.max_active_downloads || 5;
                                this.downloadPathDirty = false;
                                this.localTmdbApiKey = data.tmdb_api_key;
                                this.tmdbApiKeyDirty = false;
                            }
                        } catch (error) {
                            console.error("Failed to load settings:", error);
                        } finally {
                            this.loading = false;
                        }
                    },

                    showAlert(type, message) {
                        this.alert = { show: true, type, message };
                        setTimeout(() => {
                            this.alert.show = false;
                        }, 5000);
                    },

                    async saveDownloadPath() {
                        if (!this.downloadPathDirty) return;

                        this.savingSettings = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    method: "PUT",
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        ...this.settings,
                                        default_download_path:
                                            this.localDownloadPath,
                                    }),
                                },
                            );

                            if (response.ok) {
                                this.settings.default_download_path =
                                    this.localDownloadPath;
                                this.downloadPathDirty = false;
                                this.showAlert(
                                    "success",
                                    "Settings saved successfully",
                                );
                            } else {
                                const error = await response.json();
                                this.showAlert(
                                    "error",
                                    error.detail || "Failed to save settings",
                                );
                            }
                        } catch (error) {
                            console.error("Failed to save settings:", error);
                            this.showAlert("error", "Failed to save settings");
                        } finally {
                            this.savingSettings = false;
                        }
                    },

                    async saveMaxActiveDownloads() {
                        if (!this.maxActiveDownloadsDirty) return;

                        this.savingSettings = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    method: "PUT",
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        ...this.settings,
                                        max_active_downloads:
                                            parseInt(this.localMaxActiveDownloads),
                                    }),
                                },
                            );

                            if (response.ok) {
                                this.settings.max_active_downloads =
                                    parseInt(this.localMaxActiveDownloads);
                                this.maxActiveDownloadsDirty = false;
                                this.showAlert(
                                    "success",
                                    "Settings saved successfully",
                                );
                            } else {
                                const error = await response.json();
                                this.showAlert(
                                    "error",
                                    error.detail || "Failed to save settings",
                                );
                            }
                        } catch (error) {
                            console.error("Failed to save settings:", error);
                            this.showAlert("error", "Failed to save settings");
                        } finally {
                            this.savingSettings = false;
                        }
                    },

                    async saveTmdbApiKey() {
                        if (!this.tmdbApiKeyDirty) return;

                        this.savingSettings = true;
                        const token = getCookie("access_token");

                        try {
                            const apiBase = await ensureApiInitialized();
                            const response = await fetch(
                                `${apiBase}/settings`,
                                {
                                    method: "PUT",
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        ...this.settings,
                                        tmdb_api_key: this.localTmdbApiKey,
                                    }),
                                },
                            );

                            if (response.ok) {
                                this.settings.tmdb_api_key =
                                    this.localTmdbApiKey;
                                this.tmdbApiKeyDirty = false;
                                this.showAlert(
                                    "success",
                                    "TMDB API key saved successfully",
                                );
                            } else {
                                const error = await response.json();
                                this.showAlert(
                                    "error",
                                    error.detail ||
                                        "Failed to save TMDB API key",
                                );
                            }
                        } catch (error) {
                            console.error(
                                "Failed to save TMDB API key:",
                                error,
                            );
                            this.showAlert(
                                "error",
                                "Failed to save TMDB API key",
                            );
                        } finally {
                            this.savingSettings = false;
                        }
                    },

                    logout() {
                        document.cookie =
                            "access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                        document.cookie =
                            "refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                        window.location.href = "/login.html";
                    },
                };
            }
        </script>
    </body>
</html>
